# A projektnevet a -p kapcsoló / COMPOSE_PROJECT_NAME adja (több példány!).
# Alap (A) példány: projekt = könyvtárnév (kkvkepzes). Továbbiak: -p kkvkepzes_b stb.

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_file_per_table=1
      --skip-character-set-client-handshake
      --max_allowed_packet=512M
      --wait_timeout=28800
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  moodle:
    image: moodlehq/moodle-php-apache:8.4-bookworm
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MOODLE_PORT:-8080}:80"
    environment:
      # Moodle 5.x: a webgyökér a public/ alkönyvtár
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    volumes:
      # Példányonként külön kódkönyvtár (külön config.php!) – MOODLE_SRC felülírja
      - ${MOODLE_SRC:-./moodle}:/var/www/html
      - moodledata:/var/www/moodledata
      - ./docker/php-overrides.ini:/usr/local/etc/php/conf.d/zz-moodle.ini:ro
      - ./backups:/backups

volumes:
  db_data:
  moodledata:
