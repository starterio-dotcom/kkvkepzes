; Moodle 5.2 – ajánlott PHP beállítások és nagy .mbz backup visszaállításhoz
memory_limit = 512M
max_input_vars = 5000
post_max_size = 512M
upload_max_filesize = 512M
max_execution_time = 600
max_input_time = 600
max_file_uploads = 100

; --- OPcache hangolás (kritikus a Windows bind mount lassúság ellen) ---
; A Moodle 5.2 core+pluginek >13000 PHP-fájl; ha nem fér a cache-be,
; folyamatosan újraolvas a lassú fájlrendszerről -> lassú oldalak.
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.max_wasted_percentage = 10
opcache.save_comments = 1
; Realpath cache (sok include -> kevesebb stat a lassú mounton)
realpath_cache_size = 4096k
realpath_cache_ttl = 600
